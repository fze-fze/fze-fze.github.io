<p>更重要的是，它会留下判断的轨迹。</p>
<h2 id="当想法被写下来以后">当想法被写下来以后</h2>
<ul>
<li>哪些是真的重要，会更快浮出来</li>
<li>哪些只是情绪上的兴奋，也会慢慢暴露</li>
</ul>
<h2 id="所以我想保留这个板块">所以我想保留这个板块</h2>
<p>它像一个公开的思考缓存区，帮我看见自己到底在往哪里走。</p>  </article>  </main> <footer class="site-footer" data-astro-cid-sz7xmlte> <div class="container footer-shell" data-astro-cid-sz7xmlte> <nav class="contact-list" aria-label="联系方式" data-astro-cid-sz7xmlte> <a class="contact-link" href="https://x.com/" aria-label="X" target="_blank" rel="noreferrer" data-astro-cid-sz7xmlte> <img class="contact-icon is-original" src="/images/X.png" alt="" width="18" height="18" loading="lazy" data-astro-cid-sz7xmlte> </a><a class="contact-link" href="https://www.bilibili.com/" aria-label="Bilibili" target="_blank" rel="noreferrer" data-astro-cid-sz7xmlte> <img class="contact-icon" src="/images/bilibili.png" alt="" width="18" height="18" loading="lazy" data-astro-cid-sz7xmlte> </a><a class="contact-link" href="https://github.com/" aria-label="GitHub" target="_blank" rel="noreferrer" data-astro-cid-sz7xmlte> <img class="contact-icon" src="/images/github.png" alt="" width="18" height="18" loading="lazy" data-astro-cid-sz7xmlte> </a><a class="contact-link" href="https://mail.google.com/" aria-label="Gmail" target="_blank" rel="noreferrer" data-astro-cid-sz7xmlte> <img class="contact-icon" src="/images/gmail.png" alt="" width="18" height="18" loading="lazy" data-astro-cid-sz7xmlte> </a> </nav> <a class="footer-mark" href="/" data-astro-cid-sz7xmlte> <span class="footer-mark-rule" aria-hidden="true" data-astro-cid-sz7xmlte></span> <span class="footer-mark-text" data-astro-cid-sz7xmlte>fze's journal</span> <span class="footer-mark-rule" aria-hidden="true" data-astro-cid-sz7xmlte></span> </a> <div class="footer-location" aria-label="当前地址" data-astro-cid-sz7xmlte> <span class="location-dot" aria-hidden="true" data-astro-cid-sz7xmlte></span> <span data-astro-cid-sz7xmlte>中国</span> </div> </div> </footer>  </body></html>
